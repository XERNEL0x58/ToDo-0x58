    @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&display=swap');

    .page { display: none; animation: fadeIn 0.3s ease; }

    .task-checkbox { appearance: none; width: 24px; height: 24px; border: 2px solid var(--border); border-radius: 6px; cursor: pointer; position: relative; transition: all 0.2s ease; flex-shrink: 0; }
    .task-checkbox:checked { background: var(--primary); border-color: var(--primary); }
    .task-checkbox:checked::after { content: ''; position: absolute; left: 6px; top: 2px; width: 6px; height: 12px; border: solid white; border-width: 0 2px 2px 0; transform: rotate(45deg); }

    .progress-bar { height: 6px; background: rgba(255,255,255,0.05); border-radius: 3px; overflow: hidden; }
    .progress-fill { height: 100%; background: linear-gradient(90deg, #00E676, #00C853); border-radius: 3px; transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1); }

    .fab { position: fixed; bottom: 90px; left: 24px; width: 60px; height: 60px; background: linear-gradient(135deg, #00E676, #00C853); border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 8px 32px rgba(0, 230, 118, 0.3); cursor: pointer; z-index: 100; transition: transform 0.2s ease, box-shadow 0.2s ease; border: none; }
    .fab:active { transform: scale(0.95); }

    .card { transition: transform 0.2s ease, box-shadow 0.2s ease; }
    .card:active { transform: scale(0.98); }

    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(8px); z-index: 200; display: none; align-items: flex-end; justify-content: center; animation: fadeIn 0.2s ease; }

    .safe-top { padding-top: env(safe-area-inset-top); }

  <script>
/**
 * ToDo 0x58 - Bundled Application
 * All modules combined for GitHub Pages compatibility
 */

'use strict';

// ==================== TYPES & CONSTANTS ====================
/**
 * @typedef {Object} Task
 * @property {string} id
 * @property {string} title
 * @property {string} description
 * @property {string} date - YYYY-MM-DD
 * @property {string} time - HH:MM
 * @property {'urgent'|'high'|'medium'|'low'} priority
 * @property {string} tag
 * @property {boolean} completed
 * @property {string} createdAt - ISO string
 */

/**
 * @typedef {Object} FilterType
 * @property {string} id
 * @property {string} label
 * @property {Function} predicate
 */

/**
 * @typedef {Object} StatsData
 * @property {number} total
 * @property {number} completed
 * @property {number} pending
 * @property {number} completionRate
 * @property {Object} byPriority
 * @property {Object} byTag
 * @property {Object} byDay
 */

/**
 * @typedef {Object} CalendarDay
 * @property {number} day
 * @property {boolean} isCurrentMonth
 * @property {boolean} isToday
 * @property {boolean} hasTasks
 * @property {number} taskCount
 */

/**
 * @typedef {Object} AppState
 * @property {Task[]} tasks
 * @property {string} currentPage
 * @property {string} currentFilter
 * @property {string} searchQuery
 * @property {string} selectedDate
 * @property {string[]} tags
 * @property {boolean} isLoading
 * @property {boolean} isModalOpen
 */

const PRIORITIES = {
  urgent: { label: 'عاجلة', color: '#FF3D71', emoji: '🔴' },
  high: { label: 'عالية', color: '#FF9800', emoji: '🟠' },
  medium: { label: 'متوسطة', color: '#FFC107', emoji: '🟡' },
  low: { label: 'منخفضة', color: '#00E676', emoji: '🟢' }
};

const DEFAULT_TAGS = [
  'العيادة',
  'كاميرات_المراقبة',
  'نظام_التأجير',
  'لينكس',
  'شخصي'
];

const FILTERS = [
  { id: 'all', label: 'جميع المهام' },
  { id: 'today', label: 'مهام اليوم' },
  { id: 'week', label: 'هذا الأسبوع' },
  { id: 'month', label: 'هذا الشهر' },
  { id: 'completed', label: 'المنجزة' },
  { id: 'pending', label: 'غير المنجزة' }
];

const PAGES = {
  home: 'home',
  tasks: 'tasks',
  calendar: 'calendar',
  stats: 'stats',
  settings: 'settings'
};


// ==================== HELPERS ====================
/**
 * Utility Functions
 * @module utils/helpers
 */

'use strict';

/**
 * Generate a unique ID
 * @returns {string}
 */
function generateId() {
  return Date.now().toString(36) + Math.random().toString(36).substr(2, 9);
}

/**
 * Format date to Arabic display string
 * @param {string} dateStr - YYYY-MM-DD
 * @returns {string}
 */
function formatDate(dateStr) {
  if (!dateStr) return '';
  const date = new Date(dateStr + 'T00:00:00');
  const options = { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' };
  return date.toLocaleDateString('ar-SA', options);
}

/**
 * Format time to 12-hour Arabic format
 * @param {string} timeStr - HH:MM
 * @returns {string}
 */
function formatTime(timeStr) {
  if (!timeStr) return '';
  const [hours, minutes] = timeStr.split(':').map(Number);
  const period = hours >= 12 ? 'م' : 'ص';
  const displayHours = hours % 12 || 12;
  return `${displayHours}:${minutes.toString().padStart(2, '0')} ${period}`;
}

/**
 * Get today's date as YYYY-MM-DD
 * @returns {string}
 */
function getToday() {
  return new Date().toISOString().split('T')[0];
}

/**
 * Check if a date is today
 * @param {string} dateStr
 * @returns {boolean}
 */
function isToday(dateStr) {
  return dateStr === getToday();
}

/**
 * Check if a date is this week
 * @param {string} dateStr
 * @returns {boolean}
 */
function isThisWeek(dateStr) {
  const date = new Date(dateStr + 'T00:00:00');
  const today = new Date();
  const startOfWeek = new Date(today);
  startOfWeek.setDate(today.getDate() - today.getDay());
  startOfWeek.setHours(0, 0, 0, 0);
  const endOfWeek = new Date(startOfWeek);
  endOfWeek.setDate(startOfWeek.getDate() + 6);
  endOfWeek.setHours(23, 59, 59, 999);
  return date >= startOfWeek && date <= endOfWeek;
}

/**
 * Check if a date is this month
 * @param {string} dateStr
 * @returns {boolean}
 */
function isThisMonth(dateStr) {
  const date = new Date(dateStr + 'T00:00:00');
  const today = new Date();
  return date.getMonth() === today.getMonth() && date.getFullYear() === today.getFullYear();
}

/**
 * Get month name in Arabic
 * @param {number} monthIndex - 0-11
 * @returns {string}
 */
function getMonthName(monthIndex) {

}

/**

/**

function getShortDayName(dayIndex) {

/**
 * Get days in month
 * @param {number} year
 * @param {number} month - 0-11
 * @returns {number}
 */
function getDaysInMonth(year, month) {
  return new Date(year, month + 1, 0).getDate();
}

/**
 * Get first day of month
 * @param {number} year
 * @param {number} month - 0-11
 * @returns {number} - 0=Sunday
 */
function getFirstDayOfMonth(year, month) {
  return new Date(year, month, 1).getDay();
}

/**
 * Debounce function
 * @param {Function} func
 * @param {number} wait
 * @returns {Function}
 */
function debounce(func, wait = 300) {
  let timeout;
  return function executedFunction(...args) {
    const later = () => {
      clearTimeout(timeout);
      func(...args);
    };
    clearTimeout(timeout);
    timeout = setTimeout(later, wait);
  };
}

/**
 * Create ripple effect
 * @param {Event} event
 * @param {HTMLElement} element
 */
function createRipple(event, element) {
  const ripple = document.createElement('span');
  ripple.classList.add('ripple');

  const rect = element.getBoundingClientRect();
  const size = Math.max(rect.width, rect.height);
  const x = event.clientX - rect.left - size / 2;
  const y = event.clientY - rect.top - size / 2;

  ripple.style.width = ripple.style.height = size + 'px';
  ripple.style.left = x + 'px';
  ripple.style.top = y + 'px';

  element.appendChild(ripple);

  setTimeout(() => ripple.remove(), 600);
}

/**
 * Format relative time
 * @param {string} dateStr
 * @returns {string}
 */
function getRelativeTime(dateStr) {
  const date = new Date(dateStr + 'T00:00:00');
  const today = new Date();
  today.setHours(0, 0, 0, 0);
  const diffTime = date - today;
  const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));

  if (diffDays === 0) return 'اليوم';
  if (diffDays === 1) return 'غداً';
  if (diffDays === -1) return 'أمس';
  if (diffDays > 1 && diffDays <= 7) return `بعد ${diffDays} أيام`;
  if (diffDays < -1 && diffDays >= -7) return `منذ ${Math.abs(diffDays)} أيام`;
  return formatDate(dateStr);
}

/**
 * Get greeting based on time
 * @returns {string}
 */
function getGreeting() {
  const hour = new Date().getHours();
  if (hour < 12) return 'صباح الخير';
  if (hour < 17) return 'مساء الخير';
  return 'مساء النور';
}

/**
 * Storage Service - LocalStorage Manager
 * @module services/storage
 */

'use strict';

const STORAGE_KEYS = {
  TASKS: 'todo58_tasks',
  TAGS: 'todo58_tags',
  SETTINGS: 'todo58_settings',
  LAST_SYNC: 'todo58_last_sync'
};

const DEFAULT_SETTINGS = {
  notifications: true,
  sound: false,
  haptic: true,
  autoSave: true,
  defaultPriority: 'medium',
  defaultTag: 'شخصي'
};

/**
 * Get tasks from storage
 * @returns {Task[]}
 */
function getTasks() {
  try {
    const data = localStorage.getItem(STORAGE_KEYS.TASKS);
    return data ? JSON.parse(data) : [];
  } catch {
    return [];
  }
}

/**
 * Save tasks to storage
 * @param {Task[]} tasks
 */
function saveTasks(tasks) {
  try {
    localStorage.setItem(STORAGE_KEYS.TASKS, JSON.stringify(tasks));
    localStorage.setItem(STORAGE_KEYS.LAST_SYNC, Date.now().toString());
    return true;
  } catch {
    return false;
  }
}

/**
 * Get tags from storage
 * @returns {string[]}
 */
function getTags() {
  try {
    const data = localStorage.getItem(STORAGE_KEYS.TAGS);
    const tags = data ? JSON.parse(data) : [];
    const defaultTags = ['العيادة', 'كاميرات_المراقبة', 'نظام_التأجير', 'لينكس', 'شخصي'];
    return [...new Set([...defaultTags, ...tags])];
  } catch {
    return ['العيادة', 'كاميرات_المراقبة', 'نظام_التأجير', 'لينكس', 'شخصي'];
  }
}

/**
 * Save tags to storage
 * @param {string[]} tags
 */
function saveTags(tags) {
  try {
    localStorage.setItem(STORAGE_KEYS.TAGS, JSON.stringify(tags));
    return true;
  } catch {
    return false;
  }
}

/**
 * Add a new tag
 * @param {string} tag
 */
function addTag(tag) {
  const tags = getTags();
  if (!tags.includes(tag)) {
    tags.push(tag);
    saveTags(tags);
  }
}

/**
 * Get settings
 * @returns {Object}
 */
function getSettings() {
  try {
    const data = localStorage.getItem(STORAGE_KEYS.SETTINGS);
    return data ? { ...DEFAULT_SETTINGS, ...JSON.parse(data) } : DEFAULT_SETTINGS;
  } catch {
    return DEFAULT_SETTINGS;
  }
}

/**
 * Save settings
 * @param {Object} settings
 */
function saveSettings(settings) {
  try {
    localStorage.setItem(STORAGE_KEYS.SETTINGS, JSON.stringify(settings));
    return true;
  } catch {
    return false;
  }
}

/**
 * Export all data
 * @returns {Object}
 */
function exportData() {
  return {
    tasks: getTasks(),
    tags: getTags(),
    settings: getSettings(),
    exportedAt: new Date().toISOString(),
    version: '1.0.0'
  };
}

/**
 * Import data
 * @param {Object} data
 * @returns {boolean}
 */
function importData(data) {
  try {
    if (data.tasks) saveTasks(data.tasks);
    if (data.tags) saveTags(data.tags);
    if (data.settings) saveSettings(data.settings);
    return true;
  } catch {
    return false;
  }
}

/**
 * Clear all data
 */
function clearAllData() {
  Object.values(STORAGE_KEYS).forEach(key => localStorage.removeItem(key));
}

/**
 * Get storage usage info
 * @returns {Object}
 */
function getStorageInfo() {
  let total = 0;
  let used = 0;

  for (let key in localStorage) {
    if (localStorage.hasOwnProperty(key)) {
      used += localStorage[key].length * 2; // UTF-16
    }
  }

  // Estimate total (5MB typical)
  total = 5 * 1024 * 1024;

  return {
    used,
    total,
    percentage: Math.round((used / total) * 100),
    formatted: `${(used / 1024).toFixed(1)} KB / ${(total / 1024 / 1024).toFixed(0)} MB`
  };
}

/**
 * Backup to file
 */
function backupToFile() {
  const data = exportData();
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `todo-0x58-backup-${new Date().toISOString().split('T')[0]}.json`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

/**
 * Restore from file
 * @param {File} file
 * @returns {Promise<boolean>}
 */
function restoreFromFile(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      try {
        const data = JSON.parse(e.target.result);
        if (importData(data)) {
          resolve(true);
        } else {
          reject(new Error('فشل استيراد البيانات'));
        }
      } catch {
        reject(new Error('ملف غير صالح'));
      }
    };
    reader.onerror = () => reject(new Error('فشل قراءة الملف'));
    reader.readAsText(file);
  });
}

/**
 * Notifications Service
 * @module services/notifications
 */

'use strict';


/**
 * Request notification permission
 * @returns {Promise<string>}
 */
async function requestPermission() {
  if (!('Notification' in window)) {
    return 'unsupported';
  }

  if (Notification.permission === 'granted') {
    return 'granted';
  }

  if (Notification.permission === 'denied') {
    return 'denied';
  }

  return await Notification.requestPermission();
}

/**
 * Check if notifications are supported and permitted
 * @returns {boolean}
 */
function canNotify() {
  return 'Notification' in window && Notification.permission === 'granted';
}

/**
 * Send a notification
 * @param {string} title
 * @param {Object} options
 */
function notify(title, options = {}) {
  const settings = getSettings();
  if (!settings.notifications || !canNotify()) return;

  const defaultOptions = {
    icon: 'src/assets/icons/icon-192x192.png',
    badge: 'src/assets/icons/icon-72x72.png',
    tag: 'todo-0x58',
    requireInteraction: false,
    silent: !settings.sound,
    vibrate: settings.haptic ? [200, 100, 200] : undefined
  };

  try {
    new Notification(title, { ...defaultOptions, ...options });
  } catch (err) {
    console.error('Notification error:', err);
  }
}

/**
 * Schedule a task reminder
 * @param {Task} task
 */
function scheduleTaskReminder(task) {
  if (!task.time || !canNotify()) return;

  const [hours, minutes] = task.time.split(':').map(Number);
  const taskDate = new Date(task.date + 'T00:00:00');
  taskDate.setHours(hours, minutes, 0, 0);

  // Remind 15 minutes before
  const reminderTime = new Date(taskDate.getTime() - 15 * 60 * 1000);
  const now = new Date();

  if (reminderTime > now) {
    const delay = reminderTime - now;
    setTimeout(() => {
      notify(`تذكير: ${task.title}`, {
        body: `المهمة ستبدأ خلال 15 دقيقة (${task.time})`,
        tag: `task-${task.id}`,
        requireInteraction: true,
        data: { taskId: task.id }
      });
    }, delay);
  }
}

/**
 * Schedule all pending task reminders
 * @param {Task[]} tasks
 */
function scheduleAllReminders(tasks) {
  if (!canNotify()) return;

  const pendingTasks = tasks.filter(t => !t.completed && t.time);
  pendingTasks.forEach(scheduleTaskReminder);
}

/**
 * Cancel a scheduled reminder
 * @param {string} taskId
 */
function cancelReminder(taskId) {
  // In a real app with service workers, we'd use registration.getNotifications()
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.ready.then(registration => {
      registration.getNotifications({ tag: `task-${taskId}` }).then(notifications => {
        notifications.forEach(n => n.close());
      });
    });
  }
}

/**
 * Test notification
 */
function testNotification() {
  notify('اختبار الإشعارات', {
    body: 'تم تفعيل الإشعارات بنجاح!',
    requireInteraction: false
  });
}

/**
 * Get notification status
 * @returns {Object}
 */
function getNotificationStatus() {
  return {
    supported: 'Notification' in window,
    permission: Notification.permission || 'default',
    enabled: canNotify()
  };
}

    color: var(--danger);
    cursor: pointer;
    padding: 6px;
    border-radius: 8px;
    transition: all 0.2s ease;
  `;
  deleteBtn.innerHTML = '<i data-lucide="trash-2" style="width:16px;height:16px"></i>';
  deleteBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    if (onDelete) onDelete(task);
  });
  deleteBtn.addEventListener('mouseenter', () => deleteBtn.style.background = 'rgba(255,61,113,0.1)');
  deleteBtn.addEventListener('mouseleave', () => deleteBtn.style.background = 'none');
  actions.appendChild(deleteBtn);

  card.appendChild(actions);

  // Click on card to toggle (except buttons)
  card.addEventListener('click', (e) => {
    if (e.target === card || e.target === content || e.target === title || e.target === meta) {
      checkbox.checked = !checkbox.checked;
      if (onToggle) onToggle(task.id, checkbox.checked);
    }
  });

  return card;
}

/**
 * Calendar Component
 * @module components/Calendar
 */

'use strict';


/**
 * Create calendar component
 * @param {Date} currentDate
 * @param {Task[]} tasks
 * @param {Function} onDayClick
 * @returns {HTMLElement}
 */
function createCalendar(currentDate, tasks, onDayClick) {
  const container = document.createElement('div');
  container.style.cssText = 'padding: 0 16px;';

  const year = currentDate.getFullYear();
  const month = currentDate.getMonth();
  const daysInMonth = getDaysInMonth(year, month);
  const firstDay = getFirstDayOfMonth(year, month);
  const today = getToday();

  // Header
  const header = document.createElement('div');
  header.style.cssText = `
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
    padding: 0 8px;
  `;

  const prevBtn = document.createElement('button');
  prevBtn.style.cssText = `
    background: none;
    border: none;
    color: var(--text-secondary);
    cursor: pointer;
    padding: 8px;
    border-radius: 10px;
    transition: all 0.2s ease;
  `;
  prevBtn.innerHTML = '<i data-lucide="chevron-right" style="width:20px;height:20px"></i>';
  prevBtn.addEventListener('click', () => {
    const newDate = new Date(currentDate);
    newDate.setMonth(month - 1);
    if (onDayClick) onDayClick(null, newDate);
  });

  const title = document.createElement('h2');
  title.textContent = `${getMonthName(month)} ${year}`;
  title.style.cssText = 'font-size: 18px; font-weight: 700;';

  const nextBtn = document.createElement('button');
  nextBtn.style.cssText = prevBtn.style.cssText;
  nextBtn.innerHTML = '<i data-lucide="chevron-left" style="width:20px;height:20px"></i>';
  nextBtn.addEventListener('click', () => {
    const newDate = new Date(currentDate);
    newDate.setMonth(month + 1);
    if (onDayClick) onDayClick(null, newDate);
  });

  header.appendChild(prevBtn);
  header.appendChild(title);
  header.appendChild(nextBtn);
  container.appendChild(header);

  // Days of week
  const daysRow = document.createElement('div');
  daysRow.style.cssText = `
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 4px;
    margin-bottom: 8px;
  `;

  for (let i = 0; i < 7; i++) {
    const dayLabel = document.createElement('div');
    dayLabel.textContent = getShortDayName(i);
    dayLabel.style.cssText = `
      text-align: center;
      font-size: 12px;
      color: var(--text-secondary);
      padding: 8px 0;
      font-weight: 500;
    `;
    daysRow.appendChild(dayLabel);
  }
  container.appendChild(daysRow);

  // Calendar grid
  const grid = document.createElement('div');
  grid.style.cssText = `
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 4px;
  `;

  // Empty cells before first day
  for (let i = 0; i < firstDay; i++) {
    const empty = document.createElement('div');
    empty.style.cssText = 'height: 40px;';
    grid.appendChild(empty);
  }

  // Days
  for (let day = 1; day <= daysInMonth; day++) {
    const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
    const dayTasks = tasks.filter(t => t.date === dateStr && !t.completed);
    const hasTasks = dayTasks.length > 0;
    const isToday = dateStr === today;

    const dayEl = document.createElement('div');
    dayEl.className = `calendar-day ${isToday ? 'today' : ''} ${hasTasks ? 'has-tasks' : ''}`;
    dayEl.textContent = day;
    dayEl.dataset.date = dateStr;

    if (hasTasks) {
      dayEl.title = `${dayTasks.length} مهمة`;
    }

    dayEl.addEventListener('click', () => {
      if (onDayClick) onDayClick(dateStr, currentDate);
    });

    grid.appendChild(dayEl);
  }

  container.appendChild(grid);

  // Today's tasks summary
  const todayTasks = tasks.filter(t => t.date === today && !t.completed);
  if (todayTasks.length > 0) {
    const summary = document.createElement('div');
    summary.style.cssText = `
      margin-top: 20px;
      padding: 16px;
      background: rgba(0, 230, 118, 0.05);
      border: 1px solid rgba(0, 230, 118, 0.1);
      border-radius: var(--radius);
    `;
    summary.innerHTML = `
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px">
        <i data-lucide="calendar-check" style="width:18px;height:18px;color:var(--primary)"></i>
        <span style="font-weight:600;font-size:14px">مهام اليوم</span>
        <span style="margin-right:auto;background:var(--primary);color:#000;padding:2px 10px;border-radius:12px;font-size:12px;font-weight:700">${todayTasks.length}</span>
      </div>
      <div style="display:flex;flex-direction:column;gap:8px">
        ${todayTasks.map(t => `
          <div style="display:flex;align-items:center;gap:8px;font-size:13px;color:var(--text-secondary)">
            <div style="width:6px;height:6px;border-radius:50%;background:var(--primary);flex-shrink:0"></div>
            <span style="flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${t.title}</span>
            ${t.time ? `<span style="font-size:11px;opacity:0.7">${t.time}</span>` : ''}
          </div>
        `).join('')}
      </div>
    `;
    container.appendChild(summary);
  }

  return container;
}

/**
 * Stats Ring Component
 * @module components/StatsRing
 */

'use strict';

/**
 * Create animated stats ring
 * @param {number} percentage - 0-100
 * @param {string} label
 * @param {string} size - 'sm' | 'md' | 'lg'
 * @returns {HTMLElement}
 */
function createStatsRing(percentage, label, size = 'md') {
  const sizes = {
    sm: { width: 80, stroke: 6, font: 18 },
    md: { width: 120, stroke: 8, font: 24 },
    lg: { width: 160, stroke: 10, font: 32 }
  };

  const { width, stroke, font } = sizes[size] || sizes.md;
  const radius = (width - stroke) / 2;
  const circumference = 2 * Math.PI * radius;
  const offset = circumference - (percentage / 100) * circumference;

  const container = document.createElement('div');
  container.style.cssText = `
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
  `;

  container.innerHTML = `
    <div class="stats-ring" style="width:${width}px;height:${width}px">
      <svg width="${width}" height="${width}" viewBox="0 0 ${width} ${width}">
        <circle class="stats-ring-bg" cx="${width/2}" cy="${width/2}" r="${radius}"></circle>
        <circle class="stats-ring-fill" cx="${width/2}" cy="${width/2}" r="${radius}" 
          stroke-dasharray="${circumference}" stroke-dashoffset="${circumference}"></circle>
      </svg>
      <div class="stats-ring-text" style="font-size:${font}px">${Math.round(percentage)}%</div>
    </div>
    <span style="font-size:13px;color:var(--text-secondary);font-weight:500">${label}</span>
  `;

  // Animate after a short delay
  setTimeout(() => {
    const fill = container.querySelector('.stats-ring-fill');
    if (fill) {
      fill.style.strokeDashoffset = offset;
    }
  }, 100);

  return container;
}

/**
 * Create stats bar
 * @param {string} label
 * @param {number} value
 * @param {number} max
 * @param {string} color
 * @returns {HTMLElement}
 */
function createStatsBar(label, value, max, color = '#00E676') {
  const percentage = max > 0 ? (value / max) * 100 : 0;

  const container = document.createElement('div');
  container.style.cssText = 'margin-bottom: 16px;';

  container.innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
      <span style="font-size:13px;color:var(--text-secondary)">${label}</span>
      <span style="font-size:13px;font-weight:600">${value}</span>
    </div>
    <div class="progress-bar">
      <div class="progress-fill" style="width:0%;background:${color}"></div>
    </div>
  `;

  setTimeout(() => {
    const fill = container.querySelector('.progress-fill');
    if (fill) fill.style.width = percentage + '%';
  }, 100);

  return container;
}

/**
 * Create mini stat card
 * @param {string} icon
 * @param {string} label
 * @param {string|number} value
 * @param {string} color
 * @returns {HTMLElement}
 */
function createMiniStatCard(icon, label, value, color = '#00E676') {
  const card = document.createElement('div');
  card.style.cssText = `
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    transition: all 0.2s ease;
  `;

  card.innerHTML = `
    <div style="
      width: 44px;
      height: 44px;
      border-radius: 12px;
      background: ${color}15;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    ">
      <i data-lucide="${icon}" style="width:22px;height:22px;color:${color}"></i>
    </div>
    <div style="min-width:0">
      <div style="font-size:20px;font-weight:700;margin-bottom:2px">${value}</div>
      <div style="font-size:12px;color:var(--text-secondary)">${label}</div>
    </div>
  `;

  return card;
}

/**
 * Home Page
 * @module pages/HomePage
 */

'use strict';


/**
 * Render home page
 * @returns {HTMLElement}
 */
function renderHomePage() {
  const container = document.createElement('div');
  container.className = 'page active';
  container.id = 'home';

  const tasks = getTasks();
  const today = getToday();
  const todayTasks = tasks.filter(t => t.date === today && !t.completed);
  const weekTasks = tasks.filter(t => isThisWeek(t.date) && !t.completed);
  const completedTasks = tasks.filter(t => t.completed);
  const monthTasks = tasks.filter(t => isThisMonth(t.date));
  const monthCompleted = monthTasks.filter(t => t.completed);
  const completionRate = monthTasks.length > 0 ? (monthCompleted.length / monthTasks.length) * 100 : 0;

  // Header
  const header = document.createElement('header');
  header.style.cssText = `
    padding: 24px 20px 16px;
    position: sticky;
    top: 0;
    background: var(--bg-primary);
    z-index: 10;
  `;

  header.innerHTML = `
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
      <div>
        <h1 style="font-size:14px;color:var(--text-secondary);font-weight:400;margin-bottom:4px">${getGreeting()}</h1>
        <div style="font-size:22px;font-weight:800">ToDo 0x58</div>
      </div>
      <div style="text-align:left">
        <div style="font-size:13px;color:var(--text-secondary)">${formatDate(today)}</div>
      </div>
    </div>
  `;
  container.appendChild(header);

  // Progress section
  const progressSection = document.createElement('div');
  progressSection.style.cssText = 'padding: 0 20px 20px;';
  progressSection.innerHTML = `
    <div style="background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:20px">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
        <span style="font-size:14px;font-weight:600">إنجاز الشهر</span>
        <span style="font-size:20px;font-weight:800;color:var(--primary)">${Math.round(completionRate)}%</span>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" style="width:0%"></div>
      </div>
      <div style="display:flex;justify-content:space-between;margin-top:8px;font-size:12px;color:var(--text-secondary)">
        <span>${monthCompleted.length} منجزة</span>
        <span>${monthTasks.length - monthCompleted.length} متبقية</span>
      </div>
    </div>
  `;
  container.appendChild(progressSection);

  // Animate progress bar
  setTimeout(() => {
    const fill = progressSection.querySelector('.progress-fill');
    if (fill) fill.style.width = completionRate + '%';
  }, 200);

  // Stats cards grid
  const statsGrid = document.createElement('div');
  statsGrid.style.cssText = `
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 12px;
    padding: 0 20px 20px;
  `;

  statsGrid.appendChild(createMiniStatCard('sun', 'مهام اليوم', todayTasks.length, '#FF9800'));
  statsGrid.appendChild(createMiniStatCard('calendar-days', 'هذا الأسبوع', weekTasks.length, '#00BCD4'));
  statsGrid.appendChild(createMiniStatCard('check-circle-2', 'المنجزة', completedTasks.length, '#00E676'));
  statsGrid.appendChild(createMiniStatCard('trending-up', 'نسبة الإنجاز', Math.round(completionRate) + '%', '#4CAF50'));

  container.appendChild(statsGrid);

  // Today's tasks section
  const todaySection = document.createElement('div');
  todaySection.style.cssText = 'padding: 0 20px 20px;';

  const sectionHeader = document.createElement('div');
  sectionHeader.style.cssText = `
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
  `;
  sectionHeader.innerHTML = `
    <h2 style="font-size:16px;font-weight:700">مهام اليوم</h2>
    <span style="font-size:13px;color:var(--text-secondary)">${todayTasks.length} مهمة</span>
  `;
  todaySection.appendChild(sectionHeader);

  if (todayTasks.length === 0) {
    todaySection.appendChild(createEmptyState('لا توجد مهام لهذا اليوم', 'sun'));
  } else {
    // Sort by priority then time
    const sorted = [...todayTasks].sort((a, b) => {
      const priorityOrder = { urgent: 0, high: 1, medium: 2, low: 3 };
      if (priorityOrder[a.priority] !== priorityOrder[b.priority]) {
        return priorityOrder[a.priority] - priorityOrder[b.priority];
      }
      return (a.time || '99:99').localeCompare(b.time || '99:99');
    });

    sorted.forEach(task => {
      todaySection.appendChild(createTaskCard(task, {
        onToggle: window.app?.toggleTask,
        onEdit: window.app?.editTask,
        onDelete: window.app?.deleteTask,
        showDate: false
      }));
    });
  }

  container.appendChild(todaySection);

  // Upcoming tasks
  const upcomingTasks = tasks
    .filter(t => t.date > today && !t.completed)
    .sort((a, b) => a.date.localeCompare(b.date))
    .slice(0, 5);

  if (upcomingTasks.length > 0) {
    const upcomingSection = document.createElement('div');
    upcomingSection.style.cssText = 'padding: 0 20px 100px;';

    const upcomingHeader = document.createElement('div');
    upcomingHeader.style.cssText = `
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    `;
    upcomingHeader.innerHTML = `
      <h2 style="font-size:16px;font-weight:700">المهام القادمة</h2>
      <button id="viewAllUpcoming" style="background:none;border:none;color:var(--primary);font-size:13px;cursor:pointer;font-family:inherit;font-weight:600">عرض الكل</button>
    `;
    upcomingSection.appendChild(upcomingHeader);

    upcomingTasks.forEach(task => {
      upcomingSection.appendChild(createTaskCard(task, {
        onToggle: window.app?.toggleTask,
        onEdit: window.app?.editTask,
        onDelete: window.app?.deleteTask,
        showDate: true
      }));
    });

    container.appendChild(upcomingSection);
  }

  return container;
}

/**
 * Tasks Page
 * @module pages/TasksPage
 */

'use strict';


let currentFilter = 'all';
let searchQuery = '';
let selectedTag = '';

/**
 * Render tasks page
 * @returns {HTMLElement}
 */
function renderTasksPage() {
  const container = document.createElement('div');
  container.className = 'page';
  container.id = 'tasks';

  // Header with search
  const header = document.createElement('header');
  header.style.cssText = `
    padding: 24px 20px 16px;
    position: sticky;
    top: 0;
    background: var(--bg-primary);
    z-index: 10;
  `;

  header.innerHTML = `
    <h1 style="font-size:20px;font-weight:700;margin-bottom:16px">المهام</h1>
    <div style="position:relative">
      <i data-lucide="search" style="position:absolute;right:14px;top:50%;transform:translateY(-50%);width:18px;height:18px;color:var(--text-secondary)"></i>
      <input type="text" id="taskSearch" class="input-field" placeholder="البحث في المهام..." style="padding-right:42px" value="${searchQuery}">
    </div>
  `;
  container.appendChild(header);

  // Filters
  const filtersContainer = document.createElement('div');
  filtersContainer.style.cssText = `
    display: flex;
    gap: 8px;
    padding: 0 20px 12px;
    overflow-x: auto;
    scrollbar-width: none;
    -ms-overflow-style: none;
  `;
  filtersContainer.style.cssText += '::-webkit-scrollbar { display: none; }';

  FILTERS.forEach(filter => {
    const btn = document.createElement('button');
    btn.className = `tag ${filter.id === currentFilter ? 'active' : ''}`;
    btn.textContent = filter.label;
    btn.style.cssText += 'white-space: nowrap; padding: 6px 14px;';
    btn.addEventListener('click', () => {
      currentFilter = filter.id;
      refreshTasksList(container);
    });
    filtersContainer.appendChild(btn);
  });

  container.appendChild(filtersContainer);

  // Tags filter
  const tags = getTags();
  if (tags.length > 0) {
    const tagsContainer = document.createElement('div');
    tagsContainer.style.cssText = `
      display: flex;
      gap: 8px;
      padding: 0 20px 16px;
      overflow-x: auto;
      scrollbar-width: none;
    `;

    const allTag = document.createElement('button');
    allTag.className = `tag ${selectedTag === '' ? 'active' : ''}`;
    allTag.textContent = 'الكل';
    allTag.style.whiteSpace = 'nowrap';
    allTag.addEventListener('click', () => {
      selectedTag = '';
      refreshTasksList(container);
    });
    tagsContainer.appendChild(allTag);

    tags.forEach(tag => {
      const btn = document.createElement('button');
      btn.className = `tag ${selectedTag === tag ? 'active' : ''}`;
      btn.textContent = `#${tag}`;
      btn.style.whiteSpace = 'nowrap';
      btn.addEventListener('click', () => {
        selectedTag = tag;
        refreshTasksList(container);
      });
      tagsContainer.appendChild(btn);
    });

    container.appendChild(tagsContainer);
  }

  // Tasks list
  const tasksList = document.createElement('div');
  tasksList.id = 'tasksList';
  tasksList.style.cssText = 'padding: 0 20px 100px;';
  container.appendChild(tasksList);

  // Initial render
  refreshTasksList(container);

  // Search handler
  const searchInput = header.querySelector('#taskSearch');
  if (searchInput) {
    searchInput.addEventListener('input', debounce((e) => {
      searchQuery = e.target.value;
      refreshTasksList(container);
    }, 200));
  }

  return container;
}

/**
 * Refresh tasks list based on filters
 * @param {HTMLElement} container
 */
function refreshTasksList(container) {
  const tasksList = container.querySelector('#tasksList');
  if (!tasksList) return;

  tasksList.innerHTML = '';

  const tasks = getTasks();
  const today = getToday();

  // Apply filters
  let filtered = tasks;

  switch (currentFilter) {
    case 'today':
      filtered = tasks.filter(t => isToday(t.date));
      break;
    case 'week':
      filtered = tasks.filter(t => isThisWeek(t.date));
      break;
    case 'month':
      filtered = tasks.filter(t => isThisMonth(t.date));
      break;
    case 'completed':
      filtered = tasks.filter(t => t.completed);
      break;
    case 'pending':
      filtered = tasks.filter(t => !t.completed);
      break;
  }

  // Apply tag filter
  if (selectedTag) {
    filtered = filtered.filter(t => t.tag === selectedTag);
  }

  // Apply search
  if (searchQuery.trim()) {
    const query = searchQuery.toLowerCase();
    filtered = filtered.filter(t => 
      t.title.toLowerCase().includes(query) ||
      (t.description && t.description.toLowerCase().includes(query)) ||
      (t.tag && t.tag.toLowerCase().includes(query))
    );
  }

  // Sort: pending first, then by date, then by priority
  filtered.sort((a, b) => {
    if (a.completed !== b.completed) return a.completed ? 1 : -1;
    if (a.date !== b.date) return a.date.localeCompare(b.date);
    const priorityOrder = { urgent: 0, high: 1, medium: 2, low: 3 };
    return priorityOrder[a.priority] - priorityOrder[b.priority];
  });

  // Update filter buttons
  const filterButtons = container.querySelectorAll('.tag');
  filterButtons.forEach(btn => {
    const isFilter = FILTERS.some(f => f.label === btn.textContent);
    const isTag = !isFilter && btn.textContent !== 'الكل';

    if (isFilter) {
      const filter = FILTERS.find(f => f.label === btn.textContent);
      btn.classList.toggle('active', filter && filter.id === currentFilter);
    } else if (isTag) {
      const tag = btn.textContent.replace('#', '');
      btn.classList.toggle('active', tag === selectedTag);
    } else if (btn.textContent === 'الكل') {
      btn.classList.toggle('active', selectedTag === '');
    }
  });

  if (filtered.length === 0) {
    const emptyMsg = searchQuery 
      ? 'لا توجد نتائج للبحث' 
      : currentFilter === 'completed' 
        ? 'لا توجد مهام منجزة' 
        : 'لا توجد مهام';
    tasksList.appendChild(createEmptyState(emptyMsg, 'search'));
  } else {
    filtered.forEach(task => {
      tasksList.appendChild(createTaskCard(task, {
        onToggle: window.app?.toggleTask,
        onEdit: window.app?.editTask,
        onDelete: window.app?.deleteTask,
        showDate: currentFilter === 'all' || currentFilter === 'completed' || currentFilter === 'pending'
      }));
    });
  }

  // Re-initialize icons
  if (window.lucide) {
    window.lucide.createIcons();
  }
}

  const tasksSection = document.createElement('div');

/**
 * Handle day click
 * @param {string|null} dateStr
 * @param {Date} newDate
 */
function handleDayClick(dateStr, newDate) {
  if (dateStr) {
    selectedDate = dateStr;
  }
  if (newDate) {
    currentCalendarDate = newDate;
    // Re-render calendar
    const wrapper = document.querySelector('#calendarWrapper');
    if (wrapper) {
      wrapper.innerHTML = '';
      const tasks = getTasks();
      wrapper.appendChild(createCalendar(currentCalendarDate, tasks, handleDayClick));
      if (window.lucide) window.lucide.createIcons();
    }
  }

  // Re-render tasks for selected date
  const tasksSection = document.querySelector('#calendarTasks');
  if (tasksSection) {
    renderDateTasks(tasksSection, getTasks());
  }
}

/**
 * Render tasks for selected date
 * @param {HTMLElement} container
 * @param {Task[]} tasks
 */
function renderDateTasks(container, tasks) {
  container.innerHTML = '';

  const dateTasks = tasks.filter(t => t.date === selectedDate);
  const completedCount = dateTasks.filter(t => t.completed).length;

  const header = document.createElement('div');
  header.style.cssText = `
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
  `;
  header.innerHTML = `
    <div>
      <h2 style="font-size:16px;font-weight:700">${formatDate(selectedDate)}</h2>
      <span style="font-size:12px;color:var(--text-secondary)">${dateTasks.length} مهمة (${completedCount} منجزة)</span>
    </div>
  `;
  container.appendChild(header);

  if (dateTasks.length === 0) {
    container.appendChild(createEmptyState('لا توجد مهام في هذا اليوم', 'calendar-x'));
  } else {
    // Sort by time then priority
    const sorted = [...dateTasks].sort((a, b) => {
      if (a.time && b.time) return a.time.localeCompare(b.time);
      if (a.time) return -1;
      if (b.time) return 1;
      const priorityOrder = { urgent: 0, high: 1, medium: 2, low: 3 };
      return priorityOrder[a.priority] - priorityOrder[b.priority];
    });

    sorted.forEach(task => {
      container.appendChild(createTaskCard(task, {
        onToggle: window.app?.toggleTask,
        onEdit: window.app?.editTask,
        onDelete: window.app?.deleteTask,
        showDate: false
      }));
    });
  }

  if (window.lucide) window.lucide.createIcons();
}

/**
 * Stats Page
 * @module pages/StatsPage
 */

'use strict';


/**
 * Render stats page
 * @returns {HTMLElement}
 */
function renderStatsPage() {
  const container = document.createElement('div');
  container.className = 'page';
  container.id = 'stats';

  const tasks = getTasks();
  const today = getToday();

  // Calculate stats
  const total = tasks.length;
  const completed = tasks.filter(t => t.completed).length;
  const pending = total - completed;
  const completionRate = total > 0 ? (completed / total) * 100 : 0;

  const monthTasks = tasks.filter(t => isThisMonth(t.date));
  const monthCompleted = monthTasks.filter(t => t.completed);
  const monthRate = monthTasks.length > 0 ? (monthCompleted.length / monthTasks.length) * 100 : 0;

  // Priority breakdown
  const byPriority = {};
  Object.keys(PRIORITIES).forEach(p => {
    byPriority[p] = {
      total: tasks.filter(t => t.priority === p).length,
      completed: tasks.filter(t => t.priority === p && t.completed).length
    };
  });

  // Tag breakdown
  const byTag = {};
  const tags = getTags();
  tags.forEach(tag => {
    byTag[tag] = tasks.filter(t => t.tag === tag).length;
  });

  // Weekly data
  const byDay = {};
  for (let i = 6; i >= 0; i--) {
    const d = new Date();
    d.setDate(d.getDate() - i);
    const dateStr = d.toISOString().split('T')[0];
    byDay[dateStr] = tasks.filter(t => t.date === dateStr && t.completed).length;
  }

  // Header
  const header = document.createElement('header');
  header.style.cssText = `
    padding: 24px 20px 16px;
    position: sticky;
    top: 0;
    background: var(--bg-primary);
    z-index: 10;
  `;
  header.innerHTML = `<h1 style="font-size:20px;font-weight:700">الإحصائيات</h1>`;
  container.appendChild(header);

  // Main stats ring
  const ringSection = document.createElement('div');
  ringSection.style.cssText = `
    display: flex;
    justify-content: center;
    padding: 20px;
  `;
  ringSection.appendChild(createStatsRing(monthRate, `إنجاز ${getMonthName(new Date().getMonth())}`, 'lg'));
  container.appendChild(ringSection);

  // Stats grid
  const statsGrid = document.createElement('div');
  statsGrid.style.cssText = `
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 12px;
    padding: 0 20px 20px;
  `;

  statsGrid.appendChild(createMiniStatCard('list-todo', 'إجمالي المهام', total, '#00BCD4'));
  statsGrid.appendChild(createMiniStatCard('check-circle-2', 'المنجزة', completed, '#00E676'));
  statsGrid.appendChild(createMiniStatCard('clock', 'المتبقية', pending, '#FF9800'));
  statsGrid.appendChild(createMiniStatCard('percent', 'نسبة الإنجاز', Math.round(completionRate) + '%', '#4CAF50'));

  container.appendChild(statsGrid);

  // Priority breakdown
  const prioritySection = document.createElement('div');
  prioritySection.style.cssText = 'padding: 0 20px 20px;';
  prioritySection.innerHTML = `
    <h2 style="font-size:16px;font-weight:700;margin-bottom:16px">حسب الأولوية</h2>
    <div style="background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:20px">
      ${Object.entries(PRIORITIES).map(([key, p]) => {
        const data = byPriority[key];
        const rate = data.total > 0 ? (data.completed / data.total) * 100 : 0;
        return `
          <div style="margin-bottom:16px">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
              <span style="display:flex;align-items:center;gap:6px;font-size:13px">
                <span style="width:8px;height:8px;border-radius:50%;background:${p.color}"></span>
                ${p.label}
              </span>
              <span style="font-size:13px;font-weight:600">${data.completed}/${data.total}</span>
            </div>
            <div class="progress-bar">
              <div class="progress-fill" style="width:0%;background:${p.color}"></div>
            </div>
          </div>
        `;
      }).join('')}
    </div>
  `;
  container.appendChild(prioritySection);

  // Animate priority bars
  setTimeout(() => {
    const bars = prioritySection.querySelectorAll('.progress-fill');
    Object.entries(PRIORITIES).forEach(([key], i) => {
      const data = byPriority[key];
      const rate = data.total > 0 ? (data.completed / data.total) * 100 : 0;
      if (bars[i]) bars[i].style.width = rate + '%';
    });
  }, 300);

  // Tag breakdown
  if (Object.keys(byTag).some(k => byTag[k] > 0)) {
    const tagSection = document.createElement('div');
    tagSection.style.cssText = 'padding: 0 20px 20px;';
    tagSection.innerHTML = `<h2 style="font-size:16px;font-weight:700;margin-bottom:16px">حسب الوسم</h2>`;

    const maxTag = Math.max(...Object.values(byTag));

    Object.entries(byTag)
      .filter(([, count]) => count > 0)
      .sort(([, a], [, b]) => b - a)
      .forEach(([tag, count]) => {
        tagSection.appendChild(createStatsBar(`#${tag}`, count, maxTag, '#00BCD4'));
      });

    container.appendChild(tagSection);
  }

  // Weekly activity
  const weeklySection = document.createElement('div');
  weeklySection.style.cssText = 'padding: 0 20px 100px;';
  weeklySection.innerHTML = `<h2 style="font-size:16px;font-weight:700;margin-bottom:16px">نشاط الأسبوع</h2>`;

  const chartContainer = document.createElement('div');
  chartContainer.style.cssText = `
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    display: flex;
    align-items: flex-end;
    justify-content: space-around;
    height: 180px;
    gap: 8px;
  `;

  const maxDay = Math.max(...Object.values(byDay), 1);
  const dayNames = ['أحد', 'إثن', 'ثل', 'أرب', 'خم', 'جم', 'سب'];
  const todayIndex = new Date().getDay();

  Object.entries(byDay).forEach(([date, count], i) => {
    const dayIndex = (todayIndex - 6 + i + 7) % 7;
    const height = (count / maxDay) * 120;
    const isToday = i === 6;

    const bar = document.createElement('div');
    bar.style.cssText = `
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      flex: 1;
    `;

    bar.innerHTML = `
      <span style="font-size:12px;font-weight:600;color:var(--primary)">${count}</span>
      <div style="
        width: 100%;
        max-width: 32px;
        height: ${height}px;
        background: ${isToday ? 'var(--primary)' : 'rgba(255,255,255,0.1)'};
        border-radius: 6px 6px 0 0;
        transition: all 0.5s ease;
        min-height: 4px;
      "></div>
      <span style="font-size:11px;color:var(--text-secondary)">${dayNames[dayIndex]}</span>
    `;

    chartContainer.appendChild(bar);
  });

  weeklySection.appendChild(chartContainer);
  container.appendChild(weeklySection);

  return container;
}

/**
 * Create toggle item
 * @param {string} label
 * @param {string} id
 * @param {boolean} checked
 * @param {Function} onChange
 * @returns {HTMLElement}
 */
function createToggleItem(label, id, checked, onChange) {
  const item = document.createElement('div');
  item.style.cssText = `
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  `;

  const toggleId = `toggle-${id}`;

  item.innerHTML = `
    <span style="font-size:14px;font-weight:500">${label}</span>
    <label style="position:relative;display:inline-block;width:48px;height:28px;cursor:pointer">
      <input type="checkbox" id="${toggleId}" ${checked ? 'checked' : ''} style="opacity:0;width:0;height:0">
      <span style="
        position:absolute;
        cursor:pointer;
        inset:0;
        background:${checked ? 'var(--primary)' : 'rgba(255,255,255,0.1)'};
        border-radius:28px;
        transition:0.3s;
      ">
        <span style="
          position:absolute;
          content:'';
          height:22px;
          width:22px;
          left:3px;
          bottom:3px;
          background:white;
          border-radius:50%;
          transition:0.3s;
          transform:${checked ? 'translateX(20px)' : 'translateX(0)'};
        "></span>
      </span>
    </label>
  `;

  const checkbox = item.querySelector(`#${toggleId}`);
  checkbox.addEventListener('change', async (e) => {
    const span = item.querySelector('span > span');
    const track = item.querySelector('span');

    const result = await onChange(e.target.checked);
    if (result === false) {
      e.target.checked = !e.target.checked;
      return;
    }

    if (e.target.checked) {
      track.style.background = 'var(--primary)';
      span.style.transform = 'translateX(20px)';
    } else {
      track.style.background = 'rgba(255,255,255,0.1)';
      span.style.transform = 'translateX(0)';
    }
  });

  return item;
}

/**

  generateId, getToday, formatDate, createRipple, 
  showToast, triggerConfetti, debounce 
} from './utils/helpers.js';

// App State
let state = {
  currentPage: 'home',
  tasks: [],
  deleteTaskId: null,
  editingTask: null
};

// Initialize App
function init() {
  state.tasks = getTasks();

  // Check for URL params (shortcuts)
  const urlParams = new URLSearchParams(window.location.search);
  const action = urlParams.get('action');
  const filter = urlParams.get('filter');

  if (action === 'new-task') {
    setTimeout(() => openModal(), 500);
  }

  // Render initial page
  navigateTo('home');

  // Setup event listeners
  setupEventListeners();

  // Setup keyboard shortcuts
  setupKeyboardShortcuts();

  // Setup PWA install
  setupPWAInstall();

  // Schedule reminders
  scheduleAllReminders();

  // Initialize icons
  if (window.lucide) {
    window.lucide.createIcons();
  }

  console.log('ToDo 0x58 initialized');
}

// Navigation
function navigateTo(pageId) {
  state.currentPage = pageId;

  // Update nav
  document.querySelectorAll('.nav-item').forEach(item => {
    item.classList.toggle('active', item.dataset.page === pageId);
  });

  // Render page
  const app = document.getElementById('app');
  app.innerHTML = '';

  let page;
  switch (pageId) {
    case 'home':
      page = renderHomePage();
      break;
    case 'tasks':
      page = renderTasksPage();
      break;
    case 'calendar':
      page = renderCalendarPage();
      break;
    case 'stats':
      page = renderStatsPage();
      break;
    case 'settings':
      page = renderSettingsPage();
      break;
    default:
      page = renderHomePage();
  }

  app.appendChild(page);

  // Ensure the page is visible
  if (page && page.classList) {
    page.classList.add('active');
  }

  // Re-initialize icons
  setTimeout(() => {
    if (window.lucide) window.lucide.createIcons();
  }, 50);
}

// Setup Event Listeners
function setupEventListeners() {
  // Bottom nav
  document.querySelectorAll('.nav-item').forEach(item => {
    item.addEventListener('click', (e) => {
      const page = item.dataset.page;
      if (page) navigateTo(page);
    });
  });

  // FAB
  const fab = document.querySelector('.fab');
  if (fab) {
    fab.addEventListener('click', (e) => {
      createRipple(e, fab);
      openModal();
    });
  }

  // Modal
  const modal = document.getElementById('taskModal');
  const closeModal = document.getElementById('closeModal');
  const taskForm = document.getElementById('taskForm');

  if (closeModal) {
    closeModal.addEventListener('click', closeTaskModal);
  }

  if (modal) {
    modal.addEventListener('click', (e) => {
      if (e.target === modal) closeTaskModal();
    });
  }

  if (taskForm) {
    taskForm.addEventListener('submit', handleTaskSubmit);
  }

  // Delete modal
  const cancelDelete = document.getElementById('cancelDelete');
  const confirmDelete = document.getElementById('confirmDelete');

  if (cancelDelete) {
    cancelDelete.addEventListener('click', closeDeleteModal);
  }

  if (confirmDelete) {
    confirmDelete.addEventListener('click', handleConfirmDelete);
  }

  const deleteModal = document.getElementById('deleteModal');
  if (deleteModal) {
    deleteModal.addEventListener('click', (e) => {
      if (e.target === deleteModal) closeDeleteModal();
    });
  }

  // Install banner
  const installBanner = document.getElementById('installBanner');
  const closeInstallBanner = document.getElementById('closeInstallBanner');

  if (closeInstallBanner) {
    closeInstallBanner.addEventListener('click', () => {
      installBanner.classList.remove('active');
      localStorage.setItem('todo58_install_dismissed', 'true');
    });
  }

  // Tags in modal
  setupTagsInModal();

  // Set default date in modal
  const taskDate = document.getElementById('taskDate');
  if (taskDate) {
    taskDate.value = getToday();
  }
}

// Setup Tags in Modal
function setupTagsInModal() {
  const container = document.getElementById('tagsContainer');
  const taskTag = document.getElementById('taskTag');

  if (!container || !taskTag) return;

  const tags = getTags();
  container.innerHTML = '';

  tags.forEach(tag => {
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'tag';
    btn.textContent = `#${tag}`;
    btn.style.cssText = 'font-size: 12px; padding: 4px 10px;';
    btn.addEventListener('click', () => {
      taskTag.value = tag;
      // Highlight selected
      container.querySelectorAll('.tag').forEach(t => {
        t.classList.remove('active');
        t.style.background = 'rgba(255,255,255,0.05)';
      });
      btn.classList.add('active');
    });
    container.appendChild(btn);
  });
}

// Open Modal
function openModal(task = null) {
  const modal = document.getElementById('taskModal');
  const modalTitle = document.getElementById('modalTitle');
  const taskId = document.getElementById('taskId');
  const taskTitle = document.getElementById('taskTitle');
  const taskDesc = document.getElementById('taskDesc');
  const taskDate = document.getElementById('taskDate');
  const taskTime = document.getElementById('taskTime');
  const taskPriority = document.getElementById('taskPriority');
  const taskTag = document.getElementById('taskTag');

  state.editingTask = task;

  if (task) {
    modalTitle.textContent = 'تعديل المهمة';
    taskId.value = task.id;
    taskTitle.value = task.title;
    taskDesc.value = task.description || '';
    taskDate.value = task.date;
    taskTime.value = task.time || '';
    taskPriority.value = task.priority;
    taskTag.value = task.tag || '';
  } else {
    modalTitle.textContent = 'مهمة جديدة';
    taskId.value = '';
    taskTitle.value = '';
    taskDesc.value = '';
    taskDate.value = getToday();
    taskTime.value = '';
    taskPriority.value = 'medium';
    taskTag.value = '';
  }

  setupTagsInModal();

  modal.classList.add('active');
  document.body.style.overflow = 'hidden';

  // Focus on title
  setTimeout(() => taskTitle.focus(), 300);
}

// Close Modal
function closeTaskModal() {
  const modal = document.getElementById('taskModal');
  modal.classList.remove('active');
  document.body.style.overflow = '';
  state.editingTask = null;
}

// Handle Task Submit
function handleTaskSubmit(e) {
  e.preventDefault();

  const taskId = document.getElementById('taskId').value;
  const title = document.getElementById('taskTitle').value.trim();
  const description = document.getElementById('taskDesc').value.trim();
  const date = document.getElementById('taskDate').value;
  const time = document.getElementById('taskTime').value;
  const priority = document.getElementById('taskPriority').value;
  const tag = document.getElementById('taskTag').value.trim();

  if (!title) {
    showToast('يرجى إدخال اسم المهمة', 'error');
    return;
  }

  if (taskId) {
    // Edit existing
    const index = state.tasks.findIndex(t => t.id === taskId);
    if (index !== -1) {
      state.tasks[index] = {
        ...state.tasks[index],
        title,
        description,
        date,
        time,
        priority,
        tag
      };
      showToast('تم تحديث المهمة', 'success');
    }
  } else {
    // Create new
    const newTask = {
      id: generateId(),
      title,
      description,
      date,
      time,
      priority,
      tag,
      completed: false,
      createdAt: new Date().toISOString()
    };
    state.tasks.push(newTask);
    showToast('تمت إضافة المهمة', 'success');

    // Schedule reminder
    if (time) {
      scheduleTaskReminder(newTask);
    }
  }

  // Add tag if new
  if (tag && !getTags().includes(tag)) {
    addTag(tag);
  }

  // Save
  saveTasks(state.tasks);

  // Close modal
  closeTaskModal();

  // Refresh page
  navigateTo(state.currentPage);
}

// Toggle Task
function toggleTask(taskId, completed) {
  const index = state.tasks.findIndex(t => t.id === taskId);
  if (index === -1) return;

  state.tasks[index].completed = completed;
  saveTasks(state.tasks);

  if (completed) {
    showToast('تم إنجاز المهمة!');
    triggerConfetti();
    cancelReminder(taskId);
  } else {
    showToast('تم إرجاع المهمة');
    if (state.tasks[index].time) {
      scheduleTaskReminder(state.tasks[index]);
    }
  }

  // Refresh current page
  navigateTo(state.currentPage);
}

// Edit Task
function editTask(task) {
  openModal(task);
}

// Delete Task
function deleteTask(task) {
  state.deleteTaskId = task.id;
  const modal = document.getElementById('deleteModal');
  modal.classList.add('active');
  document.body.style.overflow = 'hidden';
}

// Confirm Delete
function handleConfirmDelete() {
  if (!state.deleteTaskId) return;

  state.tasks = state.tasks.filter(t => t.id !== state.deleteTaskId);
  saveTasks(state.tasks);
  cancelReminder(state.deleteTaskId);

  showToast('تم حذف المهمة', 'success');
  closeDeleteModal();
  navigateTo(state.currentPage);
}

// Close Delete Modal
function closeDeleteModal() {
  const modal = document.getElementById('deleteModal');
  modal.classList.remove('active');
  document.body.style.overflow = '';
  state.deleteTaskId = null;
}

// Keyboard Shortcuts
function setupKeyboardShortcuts() {
  document.addEventListener('keydown', (e) => {
    // Ctrl/Cmd + N: New task
    if ((e.ctrlKey || e.metaKey) && e.key === 'n') {
      e.preventDefault();
      openModal();
    }

    // Ctrl/Cmd + F: Focus search (on tasks page)
    if ((e.ctrlKey || e.metaKey) && e.key === 'f') {
      if (state.currentPage === 'tasks') {
        e.preventDefault();
        const searchInput = document.getElementById('taskSearch');
        if (searchInput) searchInput.focus();
      }
    }

    // Number keys for navigation
    if (!e.ctrlKey && !e.metaKey && !e.altKey) {
      switch (e.key) {
        case '1': navigateTo('home'); break;
        case '2': navigateTo('tasks'); break;
        case '3': navigateTo('calendar'); break;
        case '4': navigateTo('stats'); break;
        case '5': navigateTo('settings'); break;
      }
    }

    // Escape: Close modals
    if (e.key === 'Escape') {
      closeTaskModal();
      closeDeleteModal();
    }
  });
}

// PWA Install
let deferredPrompt = null;

function setupPWAInstall() {
  // Check if already installed or dismissed
  const isDismissed = localStorage.getItem('todo58_install_dismissed') === 'true';
  const isStandalone = window.matchMedia('(display-mode: standalone)').matches;

  if (isStandalone || isDismissed) return;

  window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    deferredPrompt = e;

    // Show install banner after a delay
    setTimeout(() => {
      const banner = document.getElementById('installBanner');
      if (banner) banner.classList.add('active');
    }, 3000);
  });

  const installBtn = document.getElementById('installBtn');
  if (installBtn) {
    installBtn.addEventListener('click', async () => {
      if (!deferredPrompt) return;

      deferredPrompt.prompt();
      const { outcome } = await deferredPrompt.userChoice;

      if (outcome === 'accepted') {
        showToast('تم تثبيت التطبيق!', 'success');
      }

      deferredPrompt = null;
      document.getElementById('installBanner').classList.remove('active');
    });
  }

  // Hide banner when installed
  window.addEventListener('appinstalled', () => {
    document.getElementById('installBanner').classList.remove('active');
    deferredPrompt = null;
    showToast('تم تثبيت التطبيق بنجاح!', 'success');
  });
}

// Schedule all reminders
function scheduleAllReminders() {
  const pendingTasks = state.tasks.filter(t => !t.completed && t.time);
  pendingTasks.forEach(scheduleTaskReminder);
}

// Expose app methods globally for components
window.app = {
  toggleTask,
  editTask,
  deleteTask,
  openModal,
  navigateTo
};

// Start app
document.addEventListener('DOMContentLoaded', init);

// Handle visibility change for notifications
document.addEventListener('visibilitychange', () => {
  if (!document.hidden) {
    // Refresh when app becomes visible
    state.tasks = getTasks();
  }
});

// Handle online/offline
window.addEventListener('online', () => {
  showToast('متصل بالإنترنت', 'success');
});

window.addEventListener('offline', () => {
  showToast('وضع عدم الاتصال', 'info');
});


</script>

  <!-- Fallback for icon initialization -->
  <script>
    function initIcons() {
      if (window.lucide && window.lucide.createIcons) {
        window.lucide.createIcons();
      } else {
        setTimeout(initIcons, 100);
      }
    }
    initIcons();
  </script>


</body>
